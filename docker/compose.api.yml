services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - ../.data:/data
    environment:
      ARCHSMITH_DB_URL: sqlite:////data/archsmith.db
    ports:
      - "8000:8000"

  api-postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    user: "${UID:-1000}:${GID:-1000}"
    profiles: ["postgres"]
    working_dir: /workspace
    volumes:
      - ../:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ARCHSMITH_DB_URL: postgresql+psycopg://archsmith:archsmith@postgres:5432/archsmith
    ports:
      - "8001:8000"

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: archsmith
      POSTGRES_USER: archsmith
      POSTGRES_PASSWORD: archsmith
    volumes:
      - archsmith_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archsmith -d archsmith"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  archsmith_pg_data:
